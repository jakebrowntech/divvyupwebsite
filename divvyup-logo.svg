<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <style>
      /* Clean, modern sans-serif fonts */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&amp;display=swap');
      
      .logo-text { 
        font-family: 'Inter', -apple-system, sans-serif; 
        font-size: 160px; 
        letter-spacing: -4px; 
      }
      
      /* Bold weight for "Divvy" */
      .divvy { 
        font-weight: 700; 
        fill: #1A1D20; 
      }
      
      /* Light weight for "Up" */
      .up { 
        font-weight: 300; 
        fill: #1A1D20; 
      }
      
      /* Simple blue accent dot */
      .accent { 
        font-weight: 700;
        fill: #007AFF; 
      }
    </style>
  </defs>

  <!-- Centered minimalist text-based logo -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" class="logo-text">
    <tspan class="divvy">Divvy</tspan>
    <tspan class="up">Up</tspan>
    <tspan class="accent">.</tspan>
  </text>
</svg>
